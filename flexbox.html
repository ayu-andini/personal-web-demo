<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Demo</title>
    <link rel="stylesheet" href="flexbox.css">
</head>
<body>

    <h1>Belajar Flexbox</h1>

    <!-- CONTOH 1 -->
    <h2>1. justify-content (Horizontal)</h2>
    <div class="container justify-demo">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
    </div>

    <!-- CONTOH 2 -->
    <h2>2. align-items (Vertical)</h2>
    <div class="container align-demo">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div>
    </div>

    <!-- CONTOH 3 -->
    <h2>3. flex-direction: column</h2>
    <div class="container column-demo">
        <div class="item">X</div>
        <div class="item">Y</div>
        <div class="item">Z</div>
    </div>

</body>
</html>
